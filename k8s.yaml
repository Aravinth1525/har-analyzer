apiVersion: apps/v1
kind: Deployment
metadata:
  name: har-analyzer
  labels:
    app: har-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: har-analyzer
  template:
    metadata:
      labels:
        app: har-analyzer
    spec:
      containers:
        - name: har-analyzer
          image: har-analyzer:latest        # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: har-analyzer-service
spec:
  selector:
    app: har-analyzer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP