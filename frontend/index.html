<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Performance Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

  <h3 class="mb-3">API Performance Analyzer</h3>

  <!-- Upload bar -->
  <div class="card p-3 mb-3">
    <div class="top-bar">
      <input type="file" id="fileInput" class="form-control file-input">
      <button class="btn btn-primary" onclick="upload()">Analyze</button>
      <button class="btn btn-success" onclick="downloadReport()">Report</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="card p-3 mb-3 d-none" id="filterCard">
    <div class="filter-bar">
      <span class="filter-label">Filters:</span>

      <div class="dd-wrap" id="dd-method">
        <button class="dd-btn" onclick="toggleDD('dd-method')">
          Method<span class="dd-badge" id="badge-method"></span><span class="dd-arrow">▾</span>
        </button>
        <div class="dd-menu" id="menu-method"></div>
      </div>

      <div class="dd-wrap" id="dd-service">
        <button class="dd-btn" onclick="toggleDD('dd-service')">
          Service<span class="dd-badge" id="badge-service"></span><span class="dd-arrow">▾</span>
        </button>
        <div class="dd-menu" id="menu-service"></div>
      </div>

      <div class="dd-wrap" id="dd-status">
        <button class="dd-btn" onclick="toggleDD('dd-status')">
          Status<span class="dd-badge" id="badge-status"></span><span class="dd-arrow">▾</span>
        </button>
        <div class="dd-menu" id="menu-status"></div>
      </div>

      <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="card p-3 mb-3 d-none" id="summaryCard">
    <div id="summary"></div>
  </div>

  <!-- Graph -->
  <div class="card p-3 mb-3 d-none" id="graphCard">
    <div class="graph-header">
      <div>
        <span class="graph-title">Response Time</span>
        <span class="graph-subtitle" id="hoverInfo">Hover over the chart to inspect</span>
      </div>
      <div class="graph-actions">
        <span class="legend-item"><i class="dot" style="background:#22c55e"></i>&lt;1s</span>
        <span class="legend-item"><i class="dot" style="background:#f97316"></i>1–2s</span>
        <span class="legend-item"><i class="dot" style="background:#ef4444"></i>&gt;2s</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="resetZoom()">Reset Zoom</button>
      </div>
    </div>
    <div class="graph-scroll" id="graphScroll">
      <div id="chartWrapper">
        <canvas id="apiChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Errors -->
  <div class="card p-3 mb-3 d-none" id="errorCard">
    <h6>Error Messages (<span id="errorCount">0</span>)</h6>
    <div id="errorList" class="list-scroll"></div>
  </div>

  <!-- Failures -->
  <div class="card p-3 mb-4 d-none" id="failureCard">
    <h6>Failure Analysis (<span id="failureCount">0</span>)</h6>
    <div id="failureList" class="list-scroll"></div>
  </div>

  <footer class="footer">Nokia Internal Tool</footer>
</div>

<script src="script.js"></script>
</body>
</html>
